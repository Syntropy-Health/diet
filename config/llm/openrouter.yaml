# OpenRouter Provider Configuration
# This config defines OpenRouter-specific settings
# Model selection is controlled by the default config or LLM default

provider: "openrouter"
base_url: "https://openrouter.ai/api/v1"
temperature: 0.1
max_tokens: 4000
request_timeout: 60
max_retries: 3

# API key loaded from OPENROUTER_API_KEY environment variable
extra_headers:
  HTTP-Referer: "https://syntropyhealth.ai"
  X-Title: "SyntropyHealth Diet Insight Engine"

# Cost optimization
cost_optimization:
  prefer_free_models: true
  token_limit_per_request: 4000
  daily_token_limit: 100000

# Fallback configuration
fallback:
  enabled: true
  provider: "openai"
  model: "gpt-3.5-turbo"
