# Production Logging Configuration
name: "development"

# Logging levels
levels:
  root: INFO
  die: INFO
  amazon_agent: INFO
  milvus: WARNING
  httpx: WARNING
  hydra: WARNING

# File logging
file:
  enabled: true
  path: "logs"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(funcName)s:%(lineno)d | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  rotation:
    max_bytes: 10485760  # 10MB
    backup_count: 5

# Console logging
console:
  enabled: true
  format: "%(asctime)s | %(levelname)s | %(message)s"
  date_format: "%H:%M:%S"
  level: INFO

# Structured logging
structured:
  enabled: true
  format: "json"
  include_timestamp: true
  include_level: true
  include_logger_name: true
